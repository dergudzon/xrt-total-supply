services:
  xrt-total-supply:
    build: .
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      ROBONOMICS_WS: ${ROBONOMICS_WS:-wss://polkadot.rpc.robonomics.network/}
      ASSET_HUB_WS: ${ASSET_HUB_WS:-wss://polkadot-asset-hub-rpc.polkadot.io}
      CACHE_TTL_MS: ${CACHE_TTL_MS:-10000}
    restart: unless-stopped
